<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>생산 납기 대시보드</title>
<style>
:root{
  --bg:#edf0f7;
  --panel:#fff;
  --muted:#5b6b86;
  --text:#0b1220;
  --line:#dde5f2;
  --red:#c62828;
  --blue:#1565c0;
  --green:#1b8f5a;
  --orange:#ef6c00;
  --purple:#8e24aa;
  --yellow:#f9a825;
  --shadow:0 2px 20px rgba(11,18,32,.08);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
.wrap{max-width:1600px;margin:auto;padding:10px;display:grid;gap:10px;}
.grid{display:grid;gap:10px;}
.kpis{grid-template-columns:repeat(4,1fr);}
.two{grid-template-columns:1fr 1fr;}
.card{background:var(--panel);border-radius:var(--radius);padding:14px;border:1px solid #ddd;box-shadow:var(--shadow);}
.card-title{font-weight:bold;margin-bottom:10px;color:#555;}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:24px;font-weight:bold;}
.kpi-sub{margin-top:4px;font-size:12px;color:var(--muted);}
.bars{display:flex;flex-direction:column;gap:6px;}
.brow{display:flex;align-items:center;gap:10px;}
.bbg{flex:1;height:16px;background:#eee;border-radius:10px;overflow:hidden;}
.bfill{height:100%;}
.bval{width:90px;text-align:right;font-weight:bold;}
.blbl{width:160px;text-align:right;font-size:12px;color:#666;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px 6px;border-bottom:1px solid #eee;font-size:13px;text-align:left;vertical-align:top;white-space:nowrap;}
th{background:#fafbff;position:sticky;top:0;z-index:1;}
.status-ok{color:var(--green);font-weight:bold;}
.status-delay{color:var(--red);font-weight:bold;}
.status-wip{color:var(--yellow);font-weight:bold;}
.text-wrap{max-width:260px;white-space:normal;word-break:break-word;line-height:1.35;}
.small{font-size:12px;color:var(--muted);}
.table-wrap{overflow:auto;}
@media (max-width:1100px){
  .kpis,.two{grid-template-columns:1fr 1fr;}
}
@media (max-width:700px){
  .kpis,.two{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="grid kpis" id="kpiGrid"></div>

  <div class="grid two">
    <div class="card">
      <div class="card-title">공장별 지연 PO</div>
      <div id="barFactory" class="bars"></div>
    </div>
    <div class="card">
      <div class="card-title">공장별 지연율</div>
      <div id="barFactoryRate" class="bars"></div>
    </div>
  </div>

  <div class="grid two">
    <div class="card">
      <div class="card-title">모델별 지연</div>
      <div id="barModel" class="bars"></div>
    </div>
    <div class="card">
      <div class="card-title">지연 사유</div>
      <div id="barReason" class="bars"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">월별 선적 수량</div>
    <div id="barMonth" class="bars"></div>
  </div>

  <div class="card">
    <div class="card-title">PO별 선적 세부 사항</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>N&amp;R</th>
            <th>PO No.</th>
            <th>Item</th>
            <th>PT Q'ty</th>
            <th>Color</th>
            <th>P/issue</th>
            <th>Factory</th>
            <th>1차 수량</th>
            <th>1차 일정</th>
            <th>2차 수량</th>
            <th>2차 일정</th>
            <th>3차 수량</th>
            <th>3차 일정</th>
            <th>총 선적 수량</th>
            <th>목표 달성율</th>
            <th>ETD(VN)</th>
            <th>물류 입고 예정</th>
            <th>오더 구분</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="partialTable"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title">PO별 지연 세부 사항</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>N&amp;R</th>
            <th>PO No.</th>
            <th>Item</th>
            <th>PO Q'ty</th>
            <th>Color</th>
            <th>P/issue</th>
            <th>Factory</th>
            <th>1차 수량</th>
            <th>1차 일정</th>
            <th>2차 수량</th>
            <th>2차 일정</th>
            <th>3차 수량</th>
            <th>3차 일정</th>
            <th>총 선적 수량</th>
            <th>선적 확약일</th>
            <th>지연일수</th>
            <th>지연사유</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let DATA = [];

const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/1Irhb-aQqKlev_fchPyspqPu2QPr6dEyQ-PZf8RL3EUk/gviz/tq?tqx=out:csv&gid=1470488429";

const MONTH_TARGET = {
  "2025. 12": 31870,
  "2026. 1": 26000,
  "2026. 3": 24200
};

const REASON_KO = {
  "Material":"자재",
  "Production":"생산",
  "Capacity":"생산능력",
  "None":"없음"
};

const PARTIAL_REASON_KO = {
  "Quality issue":"품질 이슈",
  "Production balancing":"생산 밸런싱",
  "Capacity split":"생산능력 분할",
  "Production delay":"생산 지연",
  "Quality + capacity":"품질 + 생산능력",
  "None":"없음"
};

function fmt(n){
  return Number(n || 0).toLocaleString();
}

function monthKey(date){
  const str = String(date || "").trim();
  if (!str || str === "-") return "-";

  if (/^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}$/.test(str)) {
    const m = str.match(/^(\d{4})\.\s*(\d{1,2})\./);
    if (m) return `${m[1]}. ${Number(m[2])}`;
  }

  const parts = str.split("/");
  if (parts.length >= 2) {
    return `${parts[0]}월`;
  }

  return str;
}

function uniqueCount(arr, key){
  return new Set(arr.map(x => x[key])).size;
}

function safeText(v){
  return v && String(v).trim() ? String(v).trim() : "-";
}
function parseDashDate(str){
  const s = String(str || "").trim();
  if (!s || s === "-") return null;

  const cleaned = s.replace(/\./g, "-").replace(/\s+/g, "");
  const parts = cleaned.split("-").filter(Boolean);

  if (parts.length < 3) return null;

  const y = Number(parts[0]);
  const m = Number(parts[1]);
  const d = Number(parts[2]);

  if (!y || !m || !d) return null;

  return new Date(y, m - 1, d);
}
  
function tReason(v){
  return REASON_KO[v] || v || "-";
}

function tPartialReason(v){
  return PARTIAL_REASON_KO[v] || v || "-";
}

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parseNumber(value){
  return Number(String(value || "0").replace(/,/g, "").replace(/"/g, "").trim()) || 0;
}

function formatDate(value){
  const str = String(value || "").trim();
  if (!str) return "-";

  if (/^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}$/.test(str)) return str;
  if (/^\d{1,2}\/\d{1,2}$/.test(str)) return str;
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y,m,d] = str.split("-");
    return `${y}. ${Number(m)}. ${Number(d)}`;
  }

  if (/^\d+$/.test(str)) {
    const serial = Number(str);
    if (serial > 30000 && serial < 60000) {
      const epoch = new Date(Date.UTC(1899, 11, 30));
      const date = new Date(epoch.getTime() + serial * 86400000);
      const y = date.getUTCFullYear();
      const m = date.getUTCMonth() + 1;
      const d = date.getUTCDate();
      return `${y}. ${m}. ${d}`;
    }
  }

  return str;
}

function getStatusInfo(r){
  const rate = r.qty > 0 ? (r.totalQty / r.qty) * 100 : 0;
  if (rate >= 100) {
    return { text: "완료", class: "status-ok" };
  }
  return { text: "진행중", class: "status-wip" };
}

function bar(container, data, color, suffix=""){
  const values = Object.values(data);
  if(!values.length){
    container.innerHTML = '<div class="kpi-sub">데이터 없음</div>';
    return;
  }

  const max = Math.max(...values.map(v => Number(v) || 0));
  container.innerHTML = "";

  for(const k in data){
    const v = Number(data[k]) || 0;
    const w = max === 0 ? 0 : (v / max) * 100;

    container.innerHTML += `
      <div class="brow">
        <div class="blbl">${k}</div>
        <div class="bbg">
          <div class="bfill" style="width:${w}%;background:${color}"></div>
        </div>
        <div class="bval">${suffix === "%" ? v.toFixed(1) + suffix : fmt(v) + suffix}</div>
      </div>
    `;
  }
}

function groupPO(){
  const map = {};
  const poTotalMap = {};

  DATA.forEach(r => {
    if (!poTotalMap[r.poNo] || poTotalMap[r.poNo] < r.total) {
      poTotalMap[r.poNo] = r.total;
    }
  });

  DATA.forEach(r => {
    const key = `${r.poNo}__${r.color}`;

    if(!map[key]) {
      map[key] = {
        nr: r.nr,
        poNo: r.poNo,
        item: r.item,
        total: poTotalMap[r.poNo] || r.total,
        qty: r.qty,
        color: r.color,
        poIssueDate: r.poIssueDate,
        etdVN: r.etdVN,
        inboundPlan: r.inboundPlan,
        orderType: r.orderType,
        factory: r.factory,
        totalQty: 0,
        shipments: {},
        partialReasons: new Set()
      };
    }

    map[key].totalQty += r.shipmentQty;
    map[key].shipments[r.shipmentNo] = r;

    if(r.partialReason && r.partialReason !== "None") {
      map[key].partialReasons.add(tPartialReason(r.partialReason));
    }
  });

  return Object.values(map).map(r => ({
    ...r,
    partialReasonSummary: r.partialReasons.size ? [...r.partialReasons].join(", ") : "-"
  }));
}
  function groupDelayedPO(){
  return groupPO()
    .map(r => {
      const s1 = r.shipments[1];
      const s2 = r.shipments[2];
      const s3 = r.shipments[3];

      const latestActual =
        (s3 && s3.actual && s3.actual !== "-" ? s3.actual :
        s2 && s2.actual && s2.actual !== "-" ? s2.actual :
        s1 && s1.actual && s1.actual !== "-" ? s1.actual : "-");

      const maxDelayDays = Math.max(
        s1 ? Number(s1.delayDays || 0) : 0,
        s2 ? Number(s2.delayDays || 0) : 0,
        s3 ? Number(s3.delayDays || 0) : 0
      );

      const delayReasons = new Set();
      [s1, s2, s3].forEach(x => {
        if (x && x.reason && x.reason !== "None") {
          delayReasons.add(tReason(x.reason));
        }


      });

      return {
        ...r,
        latestActual,
        maxDelayDays,
        delayReasonSummary: delayReasons.size ? [...delayReasons].join(", ") : "-"
      };
    })
    .filter(r => {
  const etd = parseDashDate(r.etdVN);
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const isActuallyDelayed = r.maxDelayDays > 0;
  const isIncomplete = r.totalQty < r.qty;
  const isPastETD = etd && today > etd;

  return isActuallyDelayed || (isIncomplete && isPastETD);
});
}

function renderKPI(){
  const totalPO = uniqueCount(DATA, "poNo");
  const totalQty = DATA.reduce((s, x) => s + x.qty, 0);

  const completed = groupPO().filter(r => {
  const status = getStatusInfo(r);
  return status.text !== "진행중";
});
  const ontimeShipment = completed.filter(x => {
  const s1 = x.shipments[1];
  const s2 = x.shipments[2];
  const s3 = x.shipments[3];

  const maxDelay = Math.max(
    s1 ? Number(s1.delayDays || 0) : 0,
    s2 ? Number(s2.delayDays || 0) : 0,
    s3 ? Number(s3.delayDays || 0) : 0
  );

  return maxDelay <= 0;
}).length;

const totalShipment = completed.length;

  const delayPO = new Set(DATA.filter(x => x.delayDays > 0).map(x => x.poNo)).size;
  const delayPORate = totalPO ? ((delayPO / totalPO) * 100).toFixed(1) : "0.0";
  const otdRate = totalShipment ? ((ontimeShipment / totalShipment) * 100).toFixed(1) : "0.0";

  document.getElementById("kpiGrid").innerHTML = `
    <div class="card">
      <div class="kpi-label">총 PO 수</div>
      <div class="kpi-val">${fmt(totalPO)}</div>
      <div class="kpi-sub">고유 PO 기준</div>
    </div>
    <div class="card">
      <div class="kpi-label">총 수량</div>
      <div class="kpi-val">${fmt(totalQty)}</div>
      <div class="kpi-sub">전체 오더 수량</div>
    </div>
    <div class="card">
      <div class="kpi-label">OTD</div>
      <div class="kpi-val">${fmt(ontimeShipment)}건 / ${otdRate}%</div>
      <div class="kpi-sub">선적 차수 기준</div>
    </div>
    <div class="card">
      <div class="kpi-label">지연 PO</div>
      <div class="kpi-val">${fmt(delayPO)}건 / ${delayPORate}%</div>
      <div class="kpi-sub">고유 PO 기준</div>
    </div>
  `;
}

function renderFactory(){
  const delay = {};
  groupDelayedPO().forEach(r => {
    delay[r.factory] = (delay[r.factory] || 0) + 1;
  });
  bar(document.getElementById("barFactory"), delay, "#c62828");
}

function renderFactoryRate(){
  const total = {};
  const delay = {};

  DATA.forEach(r => {
    total[r.factory] = (total[r.factory] || 0) + 1;
    if(r.delayDays > 0){
      delay[r.factory] = (delay[r.factory] || 0) + 1;
    }
  });

  const rate = {};
  for(const f in total){
    rate[f] = ((delay[f] || 0) / total[f] * 100);
  }

  bar(document.getElementById("barFactoryRate"), rate, "#1565c0", "%");
}

function renderModel(){
  const model = {};
  groupDelayedPO().forEach(r => {
    model[r.item] = (model[r.item] || 0) + 1;
  });
  bar(document.getElementById("barModel"), model, "#ef6c00");
}

function renderReason(){
  const reason = {};
  groupDelayedPO().forEach(r => {
    const key = safeText(r.delayReasonSummary);
    reason[key] = (reason[key] || 0) + 1;
  });
  bar(document.getElementById("barReason"), reason, "#8e24aa");
}

function renderMonth(){
  const month = {};

  DATA.forEach(r => {
    const m = monthKey(r.actual);
    month[m] = (month[m] || 0) + r.shipmentQty;
  });

  const container = document.getElementById("barMonth");
  container.innerHTML = "";

  const monthOrder = ["2025. 12", "2026. 1", "2026. 3"];

  monthOrder.forEach(m => {
    const actual = month[m] || 0;
    const target = MONTH_TARGET[m] || 0;
    const rateNum = target ? (actual / target * 100) : 0;
    const rateText = target ? rateNum.toFixed(1) : "-";

    container.innerHTML += `
      <div class="brow">
        <div class="blbl">${m}</div>
        <div class="bbg">
          <div class="bfill" style="width:${Math.min(rateNum,100)}%;background:#1b8f5a"></div>
        </div>
        <div class="bval" style="width:180px;text-align:left;">
          <div>실제 선적 수량: ${fmt(actual)}</div>
          <div>목표 수량: ${fmt(target)}</div>
          <div>달성율: ${rateText}${target ? "%" : ""}</div>
        </div>
      </div>
    `;
  });
}

function renderPartialTable(){
  const rows = groupPO();
  const td = document.getElementById("partialTable");
  td.innerHTML = "";

  rows.forEach(r => {
    const s1Qty = r.shipments[1] ? fmt(r.shipments[1].shipmentQty) : "-";
    const s1Date = r.shipments[1] ? formatDate(r.shipments[1].actual) : "-";

    const s2Qty = r.shipments[2] ? fmt(r.shipments[2].shipmentQty) : "-";
    const s2Date = r.shipments[2] ? formatDate(r.shipments[2].actual) : "-";

    const s3Qty = r.shipments[3] ? fmt(r.shipments[3].shipmentQty) : "-";
    const s3Date = r.shipments[3] ? formatDate(r.shipments[3].actual) : "-";

    const achievementRate = r.qty ? ((r.totalQty / r.qty) * 100).toFixed(1) : "0.0";
    const statusInfo = getStatusInfo(r);

    td.innerHTML += `
      <tr>
        <td>${safeText(r.nr)}</td>
        <td>${safeText(r.poNo)}</td>
        <td>${safeText(r.item)}</td>
        <td>${fmt(r.qty)}</td>
        <td>${safeText(r.color)}</td>
        <td>${formatDate(r.poIssueDate)}</td>
        <td>${safeText(r.factory)}</td>
        <td>${s1Qty}</td>
        <td>${s1Date}</td>
        <td>${s2Qty}</td>
        <td>${s2Date}</td>
        <td>${s3Qty}</td>
        <td>${s3Date}</td>
        <td>${fmt(r.totalQty)}</td>
        <td>${achievementRate}%</td>
        <td>${formatDate(r.etdVN)}</td>
        <td>${formatDate(r.inboundPlan)}</td>
        <td>${safeText(r.orderType)}</td>
        <td class="${statusInfo.class}">${statusInfo.text}</td>
      </tr>
    `;
  });
}

function renderTable(){
  const rows = groupDelayedPO();
  const tb = document.getElementById("tb");
  tb.innerHTML = "";

  rows.forEach(r => {
    const s1Qty = r.shipments[1] ? fmt(r.shipments[1].shipmentQty) : "-";
    const s1Date = r.shipments[1] ? formatDate(r.shipments[1].actual) : "-";

    const s2Qty = r.shipments[2] ? fmt(r.shipments[2].shipmentQty) : "-";
    const s2Date = r.shipments[2] ? formatDate(r.shipments[2].actual) : "-";

    const s3Qty = r.shipments[3] ? fmt(r.shipments[3].shipmentQty) : "-";
    const s3Date = r.shipments[3] ? formatDate(r.shipments[3].actual) : "-";

    const plannedDate =
  r.shipments[1] ? safeText(r.shipments[1].schedule) :
  r.shipments[2] ? safeText(r.shipments[2].schedule) :
  r.shipments[3] ? safeText(r.shipments[3].schedule) : "-";

    tb.innerHTML += `
      <tr>
        <td>${safeText(r.nr)}</td>
        <td>${safeText(r.poNo)}</td>
        <td>${safeText(r.item)}</td>
        <td>${fmt(r.qty)}</td>
        <td>${safeText(r.color)}</td>
        <td>${formatDate(r.poIssueDate)}</td>
        <td>${safeText(r.factory)}</td>
        <td>${s1Qty}</td>
        <td>${s1Date}</td>
        <td>${s2Qty}</td>
        <td>${s2Date}</td>
        <td>${s3Qty}</td>
        <td>${s3Date}</td>
        <td>${fmt(r.totalQty)}</td>
        <td>${plannedDate}</td>
        <td>${fmt(r.maxDelayDays)}</td>
        <td class="text-wrap">${safeText(r.delayReasonSummary)}</td>
      </tr>
    `;
  });
}

async function loadCSV(){
  try{
    const response = await fetch(SHEET_CSV_URL);
    const text = await response.text();

    const rows = text.replace(/\r/g, "").split("\n").filter(r => r.trim() !== "");
    const bodyRows = rows.slice(1);

    DATA = bodyRows.map(r => {
  const c = parseCSVLine(r);
  return {
    nr: safeText(c[1]) === "-" ? "" : String(c[1] || "").trim(),
    poNo: String(c[2] || "").trim(),
    item: String(c[3] || "").trim(),
    factory: String(c[4] || "").trim(),       // E열 = 공장
    qty: parseNumber(c[5]),                   // F열 = Qty
    color: String(c[6] || "").trim(),         // G열
    poIssueDate: String(c[7] || "").trim(),   // H열
    shipmentNo: parseNumber(c[8]),            // I열
    shipmentQty: parseNumber(c[9]),           // J열
    schedule: String(c[10] || "").trim(),     // K열
    actual: String(c[11] || c[10] || "").trim(), // L열
    etdVN: String(c[12] || "").trim(),        // M열
    inboundPlan: String(c[13] || "").trim(),  // N열
    orderType: String(c[14] || "").trim(),    // O열
    reason: String(c[15] || "").trim(),       // P열 = Delay Reason
    delayDays: parseNumber(c[16]),            // Q열 = 지연 일수
    total: parseNumber(c[17]),                // 필요 시 실제 total 컬럼 위치에 맞게 조정
    partialReason: String(c[18] || "").trim() // 필요 시 실제 위치에 맞게 조정
  };
}).filter(x => x.poNo && x.item);

    renderKPI();
    renderFactory();
    renderFactoryRate();
    renderModel();
    renderReason();
    renderMonth();
    renderPartialTable();
    renderTable();

  }catch(error){
    document.getElementById("kpiGrid").innerHTML = `
      <div class="card">
        <div class="kpi-label">CSV 불러오기 실패</div>
        <div class="kpi-val" style="font-size:18px">스프레드시트 연결을 확인하세요</div>
        <div class="kpi-sub">GitHub Pages 반영 후 다시 새로고침 해주세요.</div>
      </div>
    `;
    console.error(error);
  }
}

loadCSV();
</script>
</body>
</html>
