<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>생산 납기 대시보드</title>
<style>
:root{
--bg:#edf0f7;--panel:#fff;--muted:#5b6b86;--text:#0b1220;--line:#dde5f2;
--red:#c62828;--blue:#1565c0;--green:#1b8f5a;--orange:#ef6c00;--purple:#8e24aa;
--shadow:0 2px 20px rgba(11,18,32,.08);--radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial;background:var(--bg);color:var(--text)}
.wrap{max-width:1500px;margin:auto;padding:10px;display:grid;gap:10px;}
.grid{display:grid;gap:10px;}
.kpis{grid-template-columns:repeat(4,1fr);}
.partial-kpis{grid-template-columns:repeat(3,1fr);}
.two{grid-template-columns:1fr 1fr;}
.card{background:white;border-radius:var(--radius);padding:14px;border:1px solid #ddd;box-shadow:var(--shadow);}
.card-title{font-weight:bold;margin-bottom:10px;color:#555}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:bold}
.kpi-sub{margin-top:4px;font-size:12px;color:var(--muted)}
.bars{display:flex;flex-direction:column;gap:6px;}
.brow{display:flex;align-items:center;gap:10px}
.bbg{flex:1;height:16px;background:#eee;border-radius:10px;overflow:hidden}
.bfill{height:100%}
.bval{width:90px;text-align:right;font-weight:bold}
.blbl{width:160px;text-align:right;font-size:12px;color:#666}
.partial-box{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fafcff}
.partial-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.partial-name{font-size:18px;font-weight:bold}
.partial-chip{font-size:11px;padding:4px 8px;border-radius:999px;background:#eef3ff;color:#3853a4}
.partial-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.meta{padding:10px;border-radius:12px;background:#fff;border:1px solid var(--line)}
.meta .lbl{font-size:12px;color:var(--muted);margin-bottom:4px}
.meta .val{font-size:20px;font-weight:bold}
.meta .sub{font-size:12px;color:var(--muted);margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 6px;border-bottom:1px solid #eee;font-size:13px;text-align:left;vertical-align:top}
th{background:#fafbff}
.status-ok{color:#1b8f5a;font-weight:bold}
.status-delay{color:#c62828;font-weight:bold}
.text-wrap{max-width:260px;white-space:normal;word-break:break-word;line-height:1.35}
.small{font-size:12px;color:var(--muted)}
@media (max-width: 1100px){
  .kpis,.partial-kpis,.two{grid-template-columns:1fr 1fr;}
}
@media (max-width: 700px){
  .kpis,.partial-kpis,.two,.partial-meta{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="wrap">

<div class="grid kpis" id="kpiGrid"></div>



<div class="grid two">
  <div class="card">
    <div class="card-title">공장별 지연 PO</div>
    <div id="barFactory" class="bars"></div>
  </div>
  <div class="card">
    <div class="card-title">공장별 지연율</div>
    <div id="barFactoryRate" class="bars"></div>
  </div>
</div>

<div class="grid two">
  <div class="card">
    <div class="card-title">모델별 지연</div>
    <div id="barModel" class="bars"></div>
  </div>
  <div class="card">
    <div class="card-title">지연 사유</div>
    <div id="barReason" class="bars"></div>
  </div>
</div>

<div class="card">
  <div class="card-title">월별 선적 수량</div>
  <div id="barMonth" class="bars"></div>
</div>

<div class="card">
  <div class="card-title">분할 선적 일정</div>
  <table>
    <thead>
      <tr>
        <th>PO</th>
        <th>품목</th>
        <th>공장</th>
        <th>1차 수량 / 일정</th>
        <th>2차 수량 / 일정</th>
        <th>3차 수량 / 일정</th>
        <th>총 수량</th>
        <th>분할 선적 사유</th>
        <th>품질 이슈 비고</th>
        <th>상태</th>
      </tr>
    </thead>
    <tbody id="partialTable"></tbody>
  </table>
</div>

<div class="card">
  <div class="card-title">지연 상위 선적</div>
  <table>
    <thead>
      <tr>
        <th>PO</th>
        <th>차수</th>
        <th>품목</th>
        <th>수량</th>
        <th>공장</th>
        <th>계획일</th>
        <th>실적일</th>
        <th>분할 선적 사유</th>
        <th>품질 이슈 비고</th>
        <th>지연</th>
      </tr>
    </thead>
    <tbody id="tb"></tbody>
  </table>
</div>
</div>

<script>
let DATA = [];

async function loadCSV(){
  try{
    const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRUofte0hZoysFaZ7ohaVcVWkzNI2GufWGeBz_s082MWGtkHeW-hiho7qOevORbHMdSpl-y3XZ3xlJ0/pub?output=csv");
    const text = await response.text();

   const rows = text.replace(/\r/g, "").split("\n").filter(r => r.trim() !== "");
    const bodyRows = rows.slice(1);

    DATA = bodyRows.map(r=>{
  const c = r.split(",");

  return {
    poNo:(c[1] || "").trim(),
    item:(c[2] || "").trim(),
    shipmentNo:Number(c[3] || 0),
    qty:Number(c[4] || 0),
    schedule:(c[5] || "").trim(),
    actual:(c[6] || "").trim(),
    delayDays:Number(c[7] || 0),
    factory:(c[8] || "").trim(),
    reason:(c[9] || "").trim(),
    partialReason:(c[10] || "").trim(),
    qualityIssueRemark:(c[11] || "").trim()
  };
});

renderKPI();
renderFactory();
renderFactoryRate();
renderModel();
renderReason();
renderMonth();
renderPartialTable();
renderTable();
    
}catch(error){
    document.getElementById("kpiGrid").innerHTML = `
      <div class="card">
        <div class="kpi-label">CSV 불러오기 실패</div>
        <div class="kpi-val" style="font-size:18px">delivery_data.csv 파일을 확인하세요</div>
        <div class="kpi-sub">HTML과 CSV를 같은 폴더에 두고, 브라우저 새로고침 또는 로컬 서버로 실행하세요.</div>
      </div>
    `;
    console.error(error);
  }
}


const REASON_KO = {
  "Material":"자재",
  "Production":"생산",
  "Capacity":"생산능력",
  "None":"없음"
};

const PARTIAL_REASON_KO = {
  "Quality issue":"품질 이슈",
  "Production balancing":"생산 밸런싱",
  "Capacity split":"생산능력 분할",
  "Production delay":"생산 지연",
  "Quality + capacity":"품질 + 생산능력",
  "None":"없음"
};

function fmt(n){return Number(n).toLocaleString()}
function monthKey(date){return date.substring(0,7)}
function uniqueCount(arr,key){return new Set(arr.map(x=>x[key])).size}
function safeText(v){return v && String(v).trim() ? String(v) : '-'}
function tReason(v){ return REASON_KO[v] || v || '-'; }
function tPartialReason(v){ return PARTIAL_REASON_KO[v] || v || '-'; }

function bar(container,data,color,suffix=""){
  const values = Object.values(data);
  if(!values.length){ container.innerHTML = '<div class="kpi-sub">데이터 없음</div>'; return; }
  const max=Math.max(...values.map(v=>Number(v)));
  container.innerHTML="";
  for(const k in data){
    const v=Number(data[k]);
    const w=max===0?0:(v/max)*100;
    container.innerHTML += `
      <div class="brow">
        <div class="blbl">${k}</div>
        <div class="bbg"><div class="bfill" style="width:${w}%;background:${color}"></div></div>
        <div class="bval">${suffix==='%'? v.toFixed(1)+suffix : fmt(v)+suffix}</div>
      </div>`;
  }
}
function groupPO(){
  const map = {};
  DATA.forEach(r=>{
    if(!map[r.poNo]) map[r.poNo] = {poNo:r.poNo,item:r.item,factory:r.factory,totalQty:0,shipments:{},partialReasons:new Set(),qualityRemarks:[]};
    map[r.poNo].totalQty += r.qty;
    map[r.poNo].shipments[r.shipmentNo] = r;
    if(r.partialReason && r.partialReason !== 'None') map[r.poNo].partialReasons.add(tPartialReason(r.partialReason));
    if(r.qualityIssueRemark && r.qualityIssueRemark.trim()) map[r.poNo].qualityRemarks.push(r.qualityIssueRemark.trim());
  });
  return Object.values(map).map(r=>({
    ...r,
    partialReasonSummary: r.partialReasons.size ? [...r.partialReasons].join(', ') : '-',
    qualityRemarkSummary: r.qualityRemarks.length ? [...new Set(r.qualityRemarks)].join(' / ') : '-'
  }));
}
function renderKPI(){
  const totalPO = uniqueCount(DATA,'poNo');
  const totalQty = DATA.reduce((s,x)=>s+x.qty,0);

  const delayShipment = DATA.filter(x=>x.delayDays>0).length;
  const ontimeShipment = DATA.filter(x=>x.delayDays<=0).length;
  const totalShipment = DATA.length;

  const delayPO = new Set(DATA.filter(x=>x.delayDays>0).map(x=>x.poNo)).size;

  const otdRate = totalShipment ? ((ontimeShipment/totalShipment)*100).toFixed(1) : '0.0';
  const delayPORate = totalPO ? ((delayPO/totalPO)*100).toFixed(1) : '0.0';

  document.getElementById('kpiGrid').innerHTML = `
    <div class="card"><div class="kpi-label">총 PO 수</div><div class="kpi-val">${fmt(totalPO)}</div><div class="kpi-sub">고유 PO 기준</div></div>
    <div class="card"><div class="kpi-label">총 수량</div><div class="kpi-val">${fmt(totalQty)}</div><div class="kpi-sub">전체 선적 수량</div></div>
    <div class="card"><div class="kpi-label">OTD</div><div class="kpi-val">${fmt(ontimeShipment)}건 / ${otdRate}%</div><div class="kpi-sub">선적 차수 기준</div></div>
    <div class="card"><div class="kpi-label">지연 PO</div><div class="kpi-val">${fmt(delayPO)}건 / ${delayPORate}%</div><div class="kpi-sub">고유 PO 기준</div></div>
  `;
}
function renderPartialKPI(){
  const rounds = [1,2,3];
  document.getElementById('partialKpiGrid').innerHTML = rounds.map(no=>{
    const rows = DATA.filter(x=>x.shipmentNo===no);
    const qty = rows.reduce((s,x)=>s+x.qty,0);
    const delay = rows.filter(x=>x.delayDays>0).length;
    const otd = rows.length ? ((rows.filter(x=>x.delayDays<=0).length/rows.length)*100).toFixed(1) : '0.0';
    const lastSchedule = rows.length ? rows.map(x=>x.schedule).sort().slice(-1)[0] : '-';
    const qualityLegs = rows.filter(x=>x.qualityIssueRemark && x.qualityIssueRemark.trim()).length;
    return `
      <div class="partial-box">
        <div class="partial-hd">
          <div>
            <div class="partial-name">${no}차 선적</div>
            <div class="kpi-sub">수량 / 일정 KPI</div>
          </div>
          <div class="partial-chip">${rows.length}건</div>
        </div>
        <div class="partial-meta">
          <div class="meta"><div class="lbl">총 수량</div><div class="val">${fmt(qty)}</div><div class="sub">${no}차 누적 수량</div></div>
          <div class="meta"><div class="lbl">OTD</div><div class="val">${otd}%</div><div class="sub">지연 ${delay}건</div></div>
          <div class="meta"><div class="lbl">최종 계획일</div><div class="val" style="font-size:16px">${lastSchedule}</div><div class="sub">가장 늦은 계획일</div></div>
          <div class="meta"><div class="lbl">품질 이슈 건수</div><div class="val">${qualityLegs}</div><div class="sub">비고 입력 건수</div></div>
        </div>
      </div>`;
  }).join('');
}
function renderFactory(){
  const delay={};
  DATA.filter(x=>x.delayDays>0).forEach(r=>{ delay[r.factory]=(delay[r.factory]||0)+1; });
  bar(document.getElementById('barFactory'),delay,'#c62828');
}
function renderFactoryRate(){
  const total={}, delay={};
  DATA.forEach(r=>{ total[r.factory]=(total[r.factory]||0)+1; if(r.delayDays>0) delay[r.factory]=(delay[r.factory]||0)+1; });
  const rate={};
  for(const f in total){ rate[f]=((delay[f]||0)/total[f]*100); }
  bar(document.getElementById('barFactoryRate'),rate,'#1565c0','%');
}
function renderModel(){
  const model={};
  DATA.filter(x=>x.delayDays>0).forEach(r=>{ model[r.item]=(model[r.item]||0)+1; });
  bar(document.getElementById('barModel'),model,'#ef6c00');
}
function renderReason(){
  const reason={};
  DATA.filter(x=>x.delayDays>0).forEach(r=>{
    const key = tReason(r.reason);
    reason[key]=(reason[key]||0)+1;
  });
  bar(document.getElementById('barReason'),reason,'#8e24aa');
}
function renderMonth(){
  const month={};
  DATA.forEach(r=>{ const m=monthKey(r.actual); month[m]=(month[m]||0)+r.qty; });
  bar(document.getElementById('barMonth'),month,'#1b8f5a');
}
function renderPartialTable(){
  const rows = groupPO();
  const td = document.getElementById('partialTable');
  td.innerHTML = '';
  rows.forEach(r=>{
    const s1 = r.shipments[1] ? `${fmt(r.shipments[1].qty)} / ${r.shipments[1].schedule}` : '-';
    const s2 = r.shipments[2] ? `${fmt(r.shipments[2].qty)} / ${r.shipments[2].schedule}` : '-';
    const s3 = r.shipments[3] ? `${fmt(r.shipments[3].qty)} / ${r.shipments[3].schedule}` : '-';
    const hasDelay = Object.values(r.shipments).some(x=>x.delayDays>0);
    td.innerHTML += `
      <tr>
        <td>${r.poNo}</td>
        <td>${r.item}</td>
        <td>${r.factory}</td>
        <td>${s1}</td>
        <td>${s2}</td>
        <td>${s3}</td>
        <td>${fmt(r.totalQty)}</td>
        <td class="text-wrap">${safeText(r.partialReasonSummary)}</td>
        <td class="text-wrap">${safeText(r.qualityRemarkSummary)}</td>
        <td class="${hasDelay?'status-delay':'status-ok'}">${hasDelay?'지연':'정상'}</td>
      </tr>`;
  });
}
function renderTable(){
  const rows=[...DATA].filter(x=>x.delayDays>0).sort((a,b)=>b.delayDays-a.delayDays).slice(0,10);
  const tb=document.getElementById('tb');
  tb.innerHTML='';
  rows.forEach(r=>{
    tb.innerHTML += `
      <tr>
        <td>${r.poNo}</td>
        <td>${r.shipmentNo}차</td>
        <td>${r.item}</td>
        <td>${fmt(r.qty)}</td>
        <td>${r.factory}</td>
        <td>${r.schedule}</td>
        <td>${r.actual}</td>
        <td class="text-wrap">${safeText(tPartialReason(r.partialReason))}</td>
        <td class="text-wrap">${safeText(r.qualityIssueRemark)}</td>
        <td>${r.delayDays}일</td>
      </tr>`;
  });
}
loadCSV();
</script>
</body>
</html>
