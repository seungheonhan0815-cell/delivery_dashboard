<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>생산 납기 대시보드</title>
<style>
:root{
  --bg:#edf0f7;
  --panel:#fff;
  --muted:#5b6b86;
  --text:#0b1220;
  --line:#dde5f2;
  --red:#c62828;
  --blue:#1565c0;
  --green:#1b8f5a;
  --orange:#ef6c00;
  --purple:#8e24aa;
  --yellow:#f9a825;
  --shadow:0 2px 20px rgba(11,18,32,.08);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);}
.wrap{max-width:1600px;margin:auto;padding:10px;display:grid;gap:10px;}
.grid{display:grid;gap:10px;}
.kpis{grid-template-columns:repeat(4,1fr);}
.two{grid-template-columns:1fr 1fr;}
.card{background:var(--panel);border-radius:var(--radius);padding:14px;border:1px solid #ddd;box-shadow:var(--shadow);}
.card-title{font-weight:bold;margin-bottom:10px;color:#555;}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
.kpi-val{font-size:24px;font-weight:bold;}
.kpi-sub{margin-top:4px;font-size:12px;color:var(--muted);}
.bars{display:flex;flex-direction:column;gap:6px;}
.brow{display:flex;align-items:center;gap:10px;}
.bbg{flex:1;height:16px;background:#eee;border-radius:10px;overflow:hidden;}
.bfill{height:100%;}
.bval{width:90px;text-align:right;font-weight:bold;}
.blbl{width:160px;text-align:right;font-size:12px;color:#666;}
table{width:100%;border-collapse:collapse;}
th,td{padding:8px 6px;border-bottom:1px solid #eee;font-size:13px;text-align:left;vertical-align:top;white-space:nowrap;}
th{background:#fafbff;position:sticky;top:0;z-index:1;}
.status-ok{color:var(--green);font-weight:bold;}
.status-delay{color:var(--red);font-weight:bold;}
.status-wip{color:var(--yellow);font-weight:bold;}
.text-wrap{max-width:260px;white-space:normal;word-break:break-word;line-height:1.35;}
.small{font-size:12px;color:var(--muted);}
.table-wrap{overflow:auto;}
.filter-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.filter-control{display:flex;align-items:center;gap:6px;}
.filter-control select,
.filter-control input{
  padding:8px 10px;
  border:1px solid #ddd;
  border-radius:8px;
  background:#fff;
}
.filter-control input{
  min-width:220px;
}
@media (max-width:1100px){
  .kpis,.two{grid-template-columns:1fr 1fr;}
}
@media (max-width:700px){
  .kpis,.two{grid-template-columns:1fr;}
}
  .highlight{
  background:#fff3cd;
  font-weight:bold;
}
.reset-btn{
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:8px;
  background:#fff;
  cursor:pointer;
}
.reset-btn:hover{
  background:#f7f7f7;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="grid kpis" id="kpiGrid"></div>

  <div class="grid two">
    <div class="card">
      <div class="card-title">공장별 지연 PO</div>
      <div id="barFactory" class="bars"></div>
    </div>
    <div class="card">
      <div class="card-title">공장별 지연율</div>
      <div id="barFactoryRate" class="bars"></div>
    </div>
  </div>

  <div class="grid two">
    <div class="card">
      <div class="card-title">모델별 지연</div>
      <div id="barModel" class="bars"></div>
    </div>
    <div class="card">
      <div class="card-title">지연 사유</div>
      <div id="barReason" class="bars"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">월별 선적 수량</div>
    <div id="barMonth" class="bars"></div>
  </div>

  <div class="card">
    <div class="card-title">필터</div>
    <div class="filter-row">
      <div class="filter-control">
        <label for="factoryFilter" class="small">공장 선택</label>
        <select id="factoryFilter">
          <option value="전체">전체</option>
        </select>
      </div>

      <div class="filter-control">
        <label for="modelFilter" class="small">모델 선택</label>
        <select id="modelFilter">
          <option value="전체">전체</option>
        </select>
      </div>

      <div class="filter-control">
        <label for="searchKeyword" class="small">PO / 모델 검색</label>
        <input
          id="searchKeyword"
          type="text"
          placeholder="PO No. 또는 모델명 입력"
        />
      </div>
      <button id="resetFilters" class="reset-btn">초기화</button>
      <button id="downloadDelayCSV" class="reset-btn">지연 PO 다운로드</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="partialTableTitle">PO별 선적 세부 사항</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>N&amp;R</th>
            <th>PO No.</th>
            <th>Item</th>
            <th>PO Q'ty</th>
            <th>Color</th>
            <th>P/issue</th>
            <th>Factory</th>
            <th>1차 수량</th>
            <th>1차 일정</th>
            <th>2차 수량</th>
            <th>2차 일정</th>
            <th>3차 수량</th>
            <th>3차 일정</th>
            <th>총 선적 수량</th>
            <th>목표 달성율</th>
            <th>ETD(VN)</th>
            <th>물류 입고 예정</th>
            <th>오더 구분</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="partialTable"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="card-title" id="delayTableTitle">PO별 지연 세부 사항</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>N&amp;R</th>
            <th>PO No.</th>
            <th>Item</th>
            <th>PO Q'ty</th>
            <th>Color</th>
            <th>P/issue</th>
            <th>Factory</th>
            <th>1차 수량</th>
            <th>1차 일정</th>
            <th>2차 수량</th>
            <th>2차 일정</th>
            <th>3차 수량</th>
            <th>3차 일정</th>
            <th>총 선적 수량</th>
            <th>선적 확약일</th>
            <th>지연일수</th>
            <th>지연사유</th>
          </tr>
        </thead>
        <tbody id="tb"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let DATA = [];
let STATUS = [];
let SELECTED_FACTORY = "전체";
let SELECTED_MODEL = "전체";
let SEARCH_KEYWORD = "";

const DETAIL_SHEET_CSV_URL = "https://script.google.com/macros/s/AKfycbzIAy42dcmaV97vAr2i2SCschxiIs9g_1echCO496CC8-Sxc3pwx-p0YaGvURa6-WaAbg/exec";
const STATUS_SHEET_CSV_URL = "https://script.google.com/macros/s/AKfycbzIAy42dcmaV97vAr2i2SCschxiIs9g_1echCO496CC8-Sxc3pwx-p0YaGvURa6-WaAbg/exec";

const MONTH_TARGET = {
  "2025. 12": 31870,
  "2026. 1": 26000,
  "2026. 3": 24200
};

const REASON_KO = {
  "Material":"자재",
  "Production":"생산",
  "Capacity":"생산능력",
  "None":"없음"
};

const PARTIAL_REASON_KO = {
  "Quality issue":"품질 이슈",
  "Production balancing":"생산 밸런싱",
  "Capacity split":"생산능력 분할",
  "Production delay":"생산 지연",
  "Quality + capacity":"품질 + 생산능력",
  "None":"없음"
};

function fmt(n){
  return Number(n || 0).toLocaleString();
}

function monthKey(date){
  const str = String(date || "").trim();
  if (!str || str === "-") return "-";

  if (/^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}$/.test(str)) {
    const m = str.match(/^(\d{4})\.\s*(\d{1,2})\./);
    if (m) return `${m[1]}. ${Number(m[2])}`;
  }

  const parts = str.split("/");
  if (parts.length >= 2) {
    return `${parts[0]}월`;
  }

  return str;
}

function safeText(v){
  return v && String(v).trim() ? String(v).trim() : "-";
}
function highlightText(text){
  const value = String(text || "");
  if(!SEARCH_KEYWORD) return value;

  const lower = value.toLowerCase();
  const keyword = SEARCH_KEYWORD.toLowerCase();
  const idx = lower.indexOf(keyword);

  if(idx === -1) return value;

  const before = value.slice(0, idx);
  const match = value.slice(idx, idx + keyword.length);
  const after = value.slice(idx + keyword.length);

  return `${before}<span class="highlight">${match}</span>${after}`;
}
function parseDashDate(str){
  const s = String(str || "").trim();
  if (!s || s === "-") return null;

  const cleaned = s.replace(/\./g, "-").replace(/\s+/g, "");
  const parts = cleaned.split("-").filter(Boolean);

  if (parts.length < 3) return null;

  const y = Number(parts[0]);
  const m = Number(parts[1]);
  const d = Number(parts[2]);

  if (!y || !m || !d) return null;

  return new Date(y, m - 1, d);
}

function tReason(v){
  return REASON_KO[v] || v || "-";
}

function tPartialReason(v){
  return PARTIAL_REASON_KO[v] || v || "-";
}

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      if (inQuotes && line[i + 1] === '"') {
        current += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += char;
    }
  }

  result.push(current);
  return result;
}

function parseNumber(value){
  const cleaned = String(value ?? "").replace(/[^\d.-]/g, "");
  const num = Number(cleaned);
  return Number.isFinite(num) ? num : 0;
}

function formatDate(value){
  const str = String(value || "").trim();
  if (!str) return "-";

  if (/^\d{4}\.\s*\d{1,2}\.\s*\d{1,2}$/.test(str)) return str;
  if (/^\d{1,2}\/\d{1,2}$/.test(str)) return str;

  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y,m,d] = str.split("-");
    return `${y}. ${Number(m)}. ${Number(d)}`;
  }

  if (/^\d+$/.test(str)) {
    const serial = Number(str);
    if (serial > 30000 && serial < 60000) {
      const epoch = new Date(Date.UTC(1899, 11, 30));
      const date = new Date(epoch.getTime() + serial * 86400000);
      const y = date.getUTCFullYear();
      const m = date.getUTCMonth() + 1;
      const d = date.getUTCDate();
      return `${y}. ${m}. ${d}`;
    }
  }

  return str;
}

function getStatusInfo(r){
  const rate = r.qty > 0 ? (r.totalQty / r.qty) * 100 : 0;
  if (rate >= 100) {
    return { text: "완료", class: "status-ok" };
  }
  return { text: "진행중", class: "status-wip" };
}

function bar(container, data, color, suffix=""){
  const values = Object.values(data);
  if(!values.length){
    container.innerHTML = '<div class="kpi-sub">데이터 없음</div>';
    return;
  }

  const max = Math.max(...values.map(v => Number(v) || 0));
  container.innerHTML = "";

  for(const k in data){
    const v = Number(data[k]) || 0;
    const w = max === 0 ? 0 : (v / max) * 100;

    container.innerHTML += `
      <div class="brow">
        <div class="blbl">${k}</div>
        <div class="bbg">
          <div class="bfill" style="width:${w}%;background:${color}"></div>
        </div>
        <div class="bval">${suffix === "%" ? v.toFixed(1) + suffix : fmt(v) + suffix}</div>
      </div>
    `;
  }
}

function groupPO(){
  const map = {};

  DATA.forEach(r => {
    const key = `${r.poNo}__${r.color}`;

    if(!map[key]) {
      map[key] = {
        nr: r.nr,
        poNo: r.poNo,
        item: r.item,
        qty: r.qty,
        color: r.color,
        poIssueDate: r.poIssueDate,
        etdVN: r.etdVN,
        inboundPlan: r.inboundPlan,
        orderType: r.orderType,
        factory: r.factory,
        totalQty: 0,
        shipments: {}
      };
    }

    map[key].totalQty += r.shipmentQty;
    map[key].shipments[r.shipmentNo] = r;
  });

  return Object.values(map);
}

function groupDelayedPO(){
  return groupPO()
    .map(r => {
      const s1 = r.shipments[1];
      const s2 = r.shipments[2];
      const s3 = r.shipments[3];

      const maxDelayDays = Math.max(
        s1 ? Number(s1.delayDays || 0) : 0,
        s2 ? Number(s2.delayDays || 0) : 0,
        s3 ? Number(s3.delayDays || 0) : 0
      );

      const delayReasons = new Set();
      [s1, s2, s3].forEach(x => {
        if (x && x.reason && x.reason !== "None") {
          delayReasons.add(tReason(x.reason));
        }
      });

      return {
        ...r,
        maxDelayDays,
        delayReasonSummary: delayReasons.size ? [...delayReasons].join(", ") : "사유 확인 필요"
      };
    })
    .filter(r => {
      const etd = parseDashDate(r.etdVN);
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const isActuallyDelayed = r.maxDelayDays > 0;
      const isIncomplete = r.totalQty < r.qty;
      const isPastETD = etd && today > etd;

      return isActuallyDelayed || (isIncomplete && isPastETD);
    });
}

function applyCommonFilters(rows){
  let result = [...rows];

  if (SELECTED_FACTORY !== "전체") {
    result = result.filter(r => r.factory === SELECTED_FACTORY);
  }

  if (SELECTED_MODEL !== "전체") {
    result = result.filter(r => r.item === SELECTED_MODEL);
  }

  if (SEARCH_KEYWORD) {
    result = result.filter(r =>
      String(r.poNo || "").toLowerCase().includes(SEARCH_KEYWORD) ||
      String(r.item || "").toLowerCase().includes(SEARCH_KEYWORD)
    );
  }

  return result;
}

function renderKPI(){
  const totalPO = STATUS.length;
  const totalQty = STATUS.reduce((s, x) => s + x.totalShippedQty, 0);

  const completedPO = STATUS.filter(x => x.actualDate && x.actualDate !== "-").length;
  const ontimePO = STATUS.filter(x => x.actualDate && x.actualDate !== "-" && x.delayFlag === "정상").length;

  const delayPO = STATUS.filter(x => x.delayFlag === "지연").length;
  const delayPORate = totalPO ? ((delayPO / totalPO) * 100).toFixed(1) : "0.0";
  const otdRate = completedPO ? ((ontimePO / completedPO) * 100).toFixed(1) : "0.0";

  document.getElementById("kpiGrid").innerHTML = `
    <div class="card">
      <div class="kpi-label">총 PO 수</div>
      <div class="kpi-val">${fmt(totalPO)}</div>
      <div class="kpi-sub">po_current_status 기준</div>
    </div>
    <div class="card">
      <div class="kpi-label">총 선적 수량</div>
      <div class="kpi-val">${fmt(totalQty)}</div>
      <div class="kpi-sub">누적 선적 수량 기준</div>
    </div>
    <div class="card">
      <div class="kpi-label">OTD</div>
      <div class="kpi-val">${fmt(ontimePO)}건 / ${otdRate}%</div>
      <div class="kpi-sub">실제 선적 완료 PO 기준</div>
    </div>
    <div class="card">
      <div class="kpi-label">지연 PO</div>
      <div class="kpi-val">${fmt(delayPO)}건 / ${delayPORate}%</div>
      <div class="kpi-sub">po_current_status 기준</div>
    </div>
  `;
}

function renderFactory(){
  const delay = {};

  STATUS
    .filter(r => r.delayFlag === "지연")
    .forEach(r => {
      delay[r.factory] = (delay[r.factory] || 0) + 1;
    });

  bar(document.getElementById("barFactory"), delay, "#c62828");
}

function renderFactoryRate(){
  const total = {};
  const delay = {};

  STATUS.forEach(r => {
    total[r.factory] = (total[r.factory] || 0) + 1;
    if(r.delayFlag === "지연"){
      delay[r.factory] = (delay[r.factory] || 0) + 1;
    }
  });

  const rate = {};
  for(const f in total){
    rate[f] = ((delay[f] || 0) / total[f] * 100);
  }

  bar(document.getElementById("barFactoryRate"), rate, "#1565c0", "%");
}

function renderModel(){
  const model = {};
  groupDelayedPO().forEach(r => {
    model[r.item] = (model[r.item] || 0) + 1;
  });
  bar(document.getElementById("barModel"), model, "#ef6c00");
}

function renderReason(){
  const reason = {};
  groupDelayedPO().forEach(r => {
    const key = safeText(r.delayReasonSummary);
    reason[key] = (reason[key] || 0) + 1;
  });
  bar(document.getElementById("barReason"), reason, "#8e24aa");
}

function renderMonth(){
  const month = {};

  DATA.forEach(r => {
    const m = monthKey(r.actual);
    month[m] = (month[m] || 0) + r.shipmentQty;
  });

  const container = document.getElementById("barMonth");
  container.innerHTML = "";

  const monthOrder = ["2025. 12", "2026. 1", "2026. 3"];

  monthOrder.forEach(m => {
    const actual = month[m] || 0;
    const target = MONTH_TARGET[m] || 0;
    const rateNum = target ? (actual / target * 100) : 0;
    const rateText = target ? rateNum.toFixed(1) : "-";

    container.innerHTML += `
      <div class="brow">
        <div class="blbl">${m}</div>
        <div class="bbg">
          <div class="bfill" style="width:${Math.min(rateNum,100)}%;background:#1b8f5a"></div>
        </div>
        <div class="bval" style="width:180px;text-align:left;">
          <div>실제 선적 수량: ${fmt(actual)}</div>
          <div>목표 수량: ${fmt(target)}</div>
          <div>달성율: ${rateText}${target ? "%" : ""}</div>
        </div>
      </div>
    `;
  });
}

function renderFactoryFilter(){
  const select = document.getElementById("factoryFilter");
  if(!select) return;

  const factories = [...new Set(DATA.map(x => x.factory).filter(Boolean))].sort();

  select.innerHTML = `<option value="전체">전체</option>` +
    factories.map(f => `<option value="${f}">${f}</option>`).join("");

  select.value = SELECTED_FACTORY;

  select.onchange = function(){
  SELECTED_FACTORY = this.value;
  SELECTED_MODEL = "전체";
  renderModelFilter();
  renderPartialTable();
  renderTable();
};
}

function renderModelFilter(){
  const select = document.getElementById("modelFilter");
  if(!select) return;

  let rows = groupPO();

  if (SELECTED_FACTORY !== "전체") {
    rows = rows.filter(r => r.factory === SELECTED_FACTORY);
  }

  const models = [...new Set(rows.map(x => x.item).filter(Boolean))].sort();

  select.innerHTML = `<option value="전체">전체</option>` +
    models.map(m => `<option value="${m}">${m}</option>`).join("");

  if (!models.includes(SELECTED_MODEL)) {
    SELECTED_MODEL = "전체";
  }

  select.value = SELECTED_MODEL;

  select.onchange = function(){
    SELECTED_MODEL = this.value;
    renderPartialTable();
    renderTable();
  };
}

function bindSearchFilter(){
  const input = document.getElementById("searchKeyword");
  if(!input) return;

  input.value = SEARCH_KEYWORD;

  input.oninput = function(){
    SEARCH_KEYWORD = this.value.trim().toLowerCase();
    renderPartialTable();
    renderTable();
  };
}

function renderPartialTable(){
  let rows = applyCommonFilters(groupPO());

  const td = document.getElementById("partialTable");
  td.innerHTML = "";
  document.getElementById("partialTableTitle").textContent = `PO별 선적 세부 사항 (${rows.length}건)`;

  rows.forEach(r => {
    const s1Qty = r.shipments[1] ? fmt(r.shipments[1].shipmentQty) : "-";
    const s1Date = r.shipments[1] ? formatDate(r.shipments[1].actual) : "-";

    const s2Qty = r.shipments[2] ? fmt(r.shipments[2].shipmentQty) : "-";
    const s2Date = r.shipments[2] ? formatDate(r.shipments[2].actual) : "-";

    const s3Qty = r.shipments[3] ? fmt(r.shipments[3].shipmentQty) : "-";
    const s3Date = r.shipments[3] ? formatDate(r.shipments[3].actual) : "-";

    const achievementRate = r.qty ? ((r.totalQty / r.qty) * 100).toFixed(1) : "0.0";
    const statusInfo = getStatusInfo(r);

    td.innerHTML += `
      <tr>
        <td>${safeText(r.nr)}</td>
        <td>${highlightText(safeText(r.poNo))}</td>
<td>${highlightText(safeText(r.item))}</td>
        <td>${fmt(r.qty)}</td>
        <td>${safeText(r.color)}</td>
        <td>${formatDate(r.poIssueDate)}</td>
        <td>${safeText(r.factory)}</td>
        <td>${s1Qty}</td>
        <td>${s1Date}</td>
        <td>${s2Qty}</td>
        <td>${s2Date}</td>
        <td>${s3Qty}</td>
        <td>${s3Date}</td>
        <td>${fmt(r.totalQty)}</td>
        <td>${achievementRate}%</td>
        <td>${formatDate(r.etdVN)}</td>
        <td>${formatDate(r.inboundPlan)}</td>
        <td>${safeText(r.orderType)}</td>
        <td class="${statusInfo.class}">${statusInfo.text}</td>
      </tr>
    `;
  });
}
function bindResetButton(){
  const btn = document.getElementById("resetFilters");
  if(!btn) return;

  btn.onclick = function(){
    SELECTED_FACTORY = "전체";
    SELECTED_MODEL = "전체";
    SEARCH_KEYWORD = "";

    renderFactoryFilter();
    renderModelFilter();
    bindSearchFilter();
    renderPartialTable();
    renderTable();
  };
}
  function escapeCSV(value){
  const text = String(value ?? "").replace(/"/g, '""');
  return `"${text}"`;
}

function asExcelText(value){
  const text = String(value ?? "").replace(/"/g, '""');
  return `="${text}"`;
}

function downloadDelayCSV(){
  let rows = applyCommonFilters(
    groupDelayedPO().sort((a, b) => b.maxDelayDays - a.maxDelayDays)
  );

  if(!rows.length){
    alert("다운로드할 지연 데이터가 없습니다.");
    return;
  }

  const headers = [
    "PO No",
    "Model",
    "Factory",
    "PO Qty",
    "Total Ship",
    "Planned Date",
    "Delay Days",
    "Delay Reason"
  ];

  const csvRows = rows.map(r => {
    const plannedDate =
      r.shipments[1]?.schedule ||
      r.shipments[2]?.schedule ||
      r.shipments[3]?.schedule ||
      "";

    return [
      asExcelText(r.poNo),                 // 지수표기 방지
      escapeCSV(r.item),
      escapeCSV(r.factory),
      r.qty,
      r.totalQty,
      escapeCSV(plannedDate),
      r.maxDelayDays,
      escapeCSV(r.delayReasonSummary)
    ].join(",");
  });

  const bom = "\uFEFF";
  const csv = bom + [headers.join(","), ...csvRows].join("\r\n");

  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = `delay_po_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}
  function bindDownloadButton(){
  const btn = document.getElementById("downloadDelayCSV");
  if(!btn) return;

  btn.onclick = downloadDelayCSV;
}
function renderTable(){
  let rows = applyCommonFilters(
    groupDelayedPO().sort((a, b) => b.maxDelayDays - a.maxDelayDays)
  );

  const tb = document.getElementById("tb");
  tb.innerHTML = "";
  document.getElementById("delayTableTitle").textContent = `PO별 지연 세부 사항 (${rows.length}건)`;

  rows.forEach(r => {
    const s1Qty = r.shipments[1] ? fmt(r.shipments[1].shipmentQty) : "-";
    const s1Date = r.shipments[1] ? formatDate(r.shipments[1].actual) : "-";

    const s2Qty = r.shipments[2] ? fmt(r.shipments[2].shipmentQty) : "-";
    const s2Date = r.shipments[2] ? formatDate(r.shipments[2].actual) : "-";

    const s3Qty = r.shipments[3] ? fmt(r.shipments[3].shipmentQty) : "-";
    const s3Date = r.shipments[3] ? formatDate(r.shipments[3].actual) : "-";

    const plannedDate =
      r.shipments[1] ? safeText(r.shipments[1].schedule) :
      r.shipments[2] ? safeText(r.shipments[2].schedule) :
      r.shipments[3] ? safeText(r.shipments[3].schedule) : "-";

    tb.innerHTML += `
      <tr>
        <td>${safeText(r.nr)}</td>
       <td>${highlightText(safeText(r.poNo))}</td>
<td>${highlightText(safeText(r.item))}</td>
        <td>${fmt(r.qty)}</td>
        <td>${safeText(r.color)}</td>
        <td>${formatDate(r.poIssueDate)}</td>
        <td>${safeText(r.factory)}</td>
        <td>${s1Qty}</td>
        <td>${s1Date}</td>
        <td>${s2Qty}</td>
        <td>${s2Date}</td>
        <td>${s3Qty}</td>
        <td>${s3Date}</td>
        <td>${fmt(r.totalQty)}</td>
        <td>${plannedDate}</td>
        <td class="${r.maxDelayDays > 0 ? 'status-delay' : ''}">${fmt(r.maxDelayDays)}</td>
        <td class="text-wrap ${r.maxDelayDays > 0 ? 'status-delay' : ''}">${safeText(r.delayReasonSummary)}</td>
      </tr>
    `;
  });
}

async function loadCSV(){
  try{
    const response = await fetch(DETAIL_SHEET_CSV_URL + "?t=" + Date.now());
    const rows = await response.json();

    DATA = rows.map(r => {
      const poQty = parseNumber(r["PO Qty"]);
      const shipmentQty = parseNumber(r["Shipment QTY"]);
      const shipmentNo = parseNumber(r["Partial Shipment order"]);
      const plannedDate = String(r["Planned ship date"] || "").trim();
      const actualDate = String(r["Actual ship date"] || "").trim();

      return {
        nr: "",
        poNo: String(r["PO No."] || "").trim(),
        item: String(r["Model name"] || "").trim(),
        factory: String(r["Factory"] || "").trim(),
        qty: poQty,
        color: String(r["Color code"] || "").trim(),
        poIssueDate: String(r["P/issue date"] || "").trim(),
        shipmentNo: shipmentNo,
        shipmentQty: shipmentQty,
        schedule: plannedDate,
        actual: actualDate || plannedDate,
        etdVN: String(r["ETD(VN)"] || "").trim(),
        inboundPlan: String(r["물류 입고 예정 일정"] || "").trim(),
        orderType: String(r["New or Reorder"] || "").trim(),
        reason: String(r["Delay Reason"] || "").trim(),
        delayDays: parseNumber(r["지연 일수"])
      };
    }).filter(x => x.poNo && x.item);

    renderModel();
    renderReason();
    renderMonth();
    renderFactoryFilter();
    renderModelFilter();
    bindSearchFilter();
    bindResetButton();
    bindDownloadButton();
    renderPartialTable();
    renderTable();

  }catch(error){
    document.getElementById("kpiGrid").innerHTML = `
      <div class="card">
        <div class="kpi-label">데이터 불러오기 실패</div>
        <div class="kpi-val" style="font-size:18px">Apps Script 연결을 확인하세요</div>
        <div class="kpi-sub">GitHub Pages 반영 후 다시 새로고침 해주세요.</div>
      </div>
    `;
    console.error("상세 데이터 불러오기 실패:", error);
  }
}

async function loadStatusCSV(){
  try{
    const response = await fetch(STATUS_SHEET_CSV_URL + "?t=" + Date.now());
    const rows = await response.json();

    const latestMap = new Map();

    rows.forEach(r => {
      const poNo = String(r["PO No."] || "").trim();
      if (!poNo) return;

      const shipmentQty = parseNumber(r["Shipment QTY"]);
      const plannedDate = String(r["Planned ship date"] || "").trim();
      const actualDate = String(r["Actual ship date"] || "").trim();
      const delayDays = parseNumber(r["지연 일수"]);

      if (!latestMap.has(poNo)) {
        latestMap.set(poNo, {
          poNo: poNo,
          modelName: String(r["Model name"] || "").trim(),
          factory: String(r["Factory"] || "").trim(),
          totalShippedQty: 0,
          plannedDate: plannedDate,
          actualDate: actualDate,
          delayFlag: delayDays > 0 ? "지연" : "정상"
        });
      }

      const item = latestMap.get(poNo);
      item.totalShippedQty += shipmentQty;

      if (plannedDate) item.plannedDate = plannedDate;
      if (actualDate) item.actualDate = actualDate;
      if (delayDays > 0) item.delayFlag = "지연";
    });

    STATUS = Array.from(latestMap.values());

    renderKPI();
    renderFactory();
    renderFactoryRate();

  }catch(error){
    console.error("상태 데이터 불러오기 실패:", error);
  }
}
async function init(){
  await loadCSV();
  await loadStatusCSV();
}

init();
</script>
